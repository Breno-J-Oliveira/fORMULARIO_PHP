<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação com Regex</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            margin-top: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .mensagens {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Validação com Regex</h2>

        <input type="text" id="numero" placeholder="Digite um número" oninput="validarNumero()">

        <br>

        <button type="button" onclick="validarNumero()">Validar</button>

        <div id="resultado" class="mensagens"></div>
    </div>

    <script>
        function validarNumero() {
            const input = document.getElementById('numero');
            const resultado = document.getElementById('resultado');
            const regex = /^\d+$/; // Expressão regular para validar apenas números
            if (regex.test(input.value)) {
                resultado.textContent = 'Número válido!';
                resultado.style.color = 'green';
            } else {
                resultado.textContent = 'Número inválido! Digite apenas números.';
                resultado.style.color = 'red';
            }
        }

    </script>
    
</body>
</html>
