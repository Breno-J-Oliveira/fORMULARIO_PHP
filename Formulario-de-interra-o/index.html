<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Interação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="titulo">
            <h1> Formulario de Interção</h1>
    </div>
    <br><br>
    <form action="">
        <div class="campo">
            <label for="name">Digite aqui :</label>
            <input type="text" id="name" name="nome" placeholder=" digite seu nome aqui" required>
            <br> <br>

        </div>
    </form>

        <form action="">
        <div class="campo">
            <label for="name">Digite o seu endereço:</label>
            <input type="text" id="name" name="nome" placeholder="Rua " required>
            <br> <br>

        </div>
    </form>

            <form action="">
        <div class="campo">
            <label for="name">Digite o seu Bairro:</label>
            <input type="text" id="name" name="nome" placeholder="Bairro" required>
            <br> <br>

        </div>
    </form>

                <form action="">
        <div class="campo">
            <label for="name">Digite a sua Cidade:</label>
            <input type="text" id="name" name="nome" placeholder="Cidade" required>
            <br> <br>

        </div>
    </form>
    <h4> Entre com sua mensagem:</h4>
        <div class="campo">
            <label for="mensagem"></label>
            <textarea name="id" id="mnsagem" rows="10" cols="70" placeholder="Digite até 500 caracteres"></textarea>
            <br> <br>
        </div>

    </form>

    <h4> Escolha o(s) modelos(s) de trahalho:</h4>
    <form action="">
        <ul>
            <li><label><input type="checkbox" name="modelos de trabalhos" value="presencial"> Presencial</label></li>
            <li><label><input type="checkbox" name="modelos de trabalho" value="remoto"> Remoto</label></li>
             <li><label><input type="checkbox" name="modelos de trabalho" value="Hibrido">Hibrido</label></li>
        </ul>
    </form>
    <br><br>

    <h4> Escolha o seu Horario de trahalho:</h4>
    <form action="">
        <ul>
            <li><label><input type="checkbox" name="Horario">Manha</label></li>
            <li><label><input type="checkbox" name="horario" value="horario"> Tarde</label></li>
             <li><label><input type="checkbox" name="horario" value="noite"> Noite</label></li>
        </ul>
    </form>
    <br><br>

    <form action="">
        <label for=""> Escolha seu Estado</label>
        <select name="" id="">
            <option value="">--Selecione--</option>
            <option value="">Rio de Janeiro</option>
            <option value="">Santa Catarina</option>    
            <option value="">Acre</option> 
            <option value="">Bahia</option>       
        </select>
    </form>

    <br><br>
    <form action="">
        <label><input type="checkbox" name="termos" value="termos">Aceita os termos de uso do site?</label>
    </form>
    <br><br>

    <div class="botoes">
        <input type="submit" value="Enviar dados">
        <input type="reset" name="Limpar dados">
    </div>


</body>
</html>
